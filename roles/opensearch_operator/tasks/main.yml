---
- name: "Include setup when enabled"
  ansible.builtin.include_tasks:
    file: "setup.yml"
    apply:
      tags:
        - "opensearch_operator"
        - "install"
  when: opensearch_operator_enabled
  tags:
    - "opensearch_operator"
    - "install"

- name: "Include cleanup when disabled"
  ansible.builtin.include_tasks:
    file: "cleanup.yml"
    apply:
      tags:
        - "opensearch_operator"
        - "uninstall"
  when: not opensearch_operator_enabled
  tags:
    - "opensearch_operator"
    - "uninstall"
