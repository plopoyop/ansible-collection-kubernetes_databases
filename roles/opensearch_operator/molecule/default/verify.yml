---
- name: Verify
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: "Wait for 'opensearch-operator' namespace to be active."
      kubernetes.core.k8s_info:
        kind: Namespace
        name: "opensearch-operator"
      register: namespace_opensearch
      until:
        - namespace_opensearch.resources | length > 0
        - namespace_opensearch.resources[0].status.phase == "Active"
      retries: 30
      delay: 5

    - name: "Assert that 'opensearch-operator' namespace is active."
      ansible.builtin.assert:
        that:
          - namespace_opensearch.resources | length > 0
          - namespace_opensearch.resources[0].status.phase == "Active"
        fail_msg: "Namespace 'opensearch-operator' is not active."

    - name: "Wait for 'opensearch-operator' deployment to be deployed."
      kubernetes.core.k8s_info:
        kind: "Deployment"
        name: "opensearch-operator"
        namespace: "opensearch-operator"
      register: operator_deployment
      until: operator_deployment.resources | length > 0
      retries: 30
      delay: 5

    - name: "Assert that 'opensearch-operator' deployment is deployed."
      ansible.builtin.assert:
        that: operator_deployment.resources | length > 0
        fail_msg: "Deployment 'opensearch-operator' is not deployed."
