---
- name: "Render MongoDB operator chart with CRDs"
  kubernetes.core.helm_template:
    chart_ref: "{{ mongodb_operator_helm_chart_ref }}"
    chart_version: "{{ mongodb_operator_helm_version }}"
    release_name: "{{ mongodb_operator_deployment_name }}"
    release_namespace: "{{ mongodb_operator_namespace }}"
    include_crds: true
    update_repo_cache: true
  register: "mongodb_operator_chart_render"
  check_mode: false
  changed_when: false

- name: "Apply MongoDB operator CRDs (server-side, force conflicts)"
  kubernetes.core.k8s:
    state: "present"
    apply: true
    server_side_apply:
      field_manager: "ansible-mongodb-operator-crds"
      force_conflicts: true
    definition: "{{ item }}"
  loop: >-
    {{ (mongodb_operator_chart_render.stdout | default(''))
       | ansible.builtin.from_yaml_all
       | select
       | selectattr('kind', 'equalto', 'CustomResourceDefinition')
       | list }}
  loop_control:
    label: "{{ item.metadata.name }}"
  when: "mongodb_operator_chart_render is not skipped"
