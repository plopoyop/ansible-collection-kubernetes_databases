---
- name: "Create MongoDB operator namespace"
  kubernetes.core.k8s:
    name: "{{ mongodb_operator_namespace }}"
    api_version: "v1"
    kind: "Namespace"
    state: "present"
  tags:
    - "namespace"

- name: "Add MongoDB Helm repository"
  kubernetes.core.helm_repository:
    name: "{{ mongodb_operator_helm_repo_name }}"
    repo_url: "{{ mongodb_operator_helm_repo_url }}"
    state: "present"
  tags:
    - "helm_repository"

- name: "Get currently installed MongoDB operator release"
  kubernetes.core.helm_info:
    name: "{{ mongodb_operator_deployment_name }}"
    release_namespace: "{{ mongodb_operator_namespace }}"
  register: "mongodb_operator_current_release"

- name: "Upgrade CRDs for existing release before helm upgrade"
  ansible.builtin.include_tasks: "upgrade_crds.yml"
  when:
    - "mongodb_operator_crds_upgrade_enabled"
    - "mongodb_operator_current_release.status.chart is defined"
  tags:
    - "crds"

- name: "Install MongoDB Operator"
  kubernetes.core.helm:
    name: "{{ mongodb_operator_deployment_name }}"
    chart_ref: "{{ mongodb_operator_helm_chart_ref }}"
    chart_version: "{{ mongodb_operator_helm_version }}"
    namespace: "{{ mongodb_operator_namespace }}"
    values: "{{ lookup('ansible.builtin.template', 'mongodb_operator_helm_values.yml.j2') | ansible.builtin.from_yaml }}"
    state: "present"
  tags:
    - "helm_chart"
