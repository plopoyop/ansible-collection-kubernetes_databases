---
- name: Verify
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: "Wait for 'mongodb' namespace to be active."
      kubernetes.core.k8s_info:
        kind: Namespace
        name: "mongodb"
      register: namespace_mongodb
      until:
        - namespace_mongodb.resources | length > 0
        - namespace_mongodb.resources[0].status.phase == "Active"
      retries: 30
      delay: 5

    - name: "Assert that 'mongodb' namespace is active."
      ansible.builtin.assert:
        that:
          - namespace_mongodb.resources | length > 0
          - namespace_mongodb.resources[0].status.phase == "Active"
        fail_msg: "Namespace 'mongodb' is not active."

    - name: "Wait for 'mongodb-kubernetes-operator' deployment to be available."
      kubernetes.core.k8s_info:
        kind: "Deployment"
        name: "mongodb-kubernetes-operator"
        namespace: "mongodb"
      register: operator_deployment
      until:
        - operator_deployment.resources | length > 0
        - operator_deployment.resources[0].status.availableReplicas | default(0) == 1
      retries: 30
      delay: 5

    - name: "Assert that 'mongodb-kubernetes-operator' deployment is available."
      ansible.builtin.assert:
        that:
          - operator_deployment.resources | length > 0
          - operator_deployment.resources[0].status.availableReplicas | default(0) == 1
        fail_msg: "Deployment 'mongodb-kubernetes-operator' is not available."

    - name: "Wait for 'mongodb-database-mongodb-instance' StatefulSet to be available."
      kubernetes.core.k8s_info:
        kind: "StatefulSet"
        name: "mongodb-database-mongodb-instance"
        namespace: "mongodb"
      register: stateful_set
      until:
        - stateful_set.resources | length > 0
        - stateful_set.resources[0].status.availableReplicas | default(0) == 1
      retries: 30
      delay: 5

    - name: "Assert that 'mongodb-database-mongodb-instance' StatefulSet is available."
      ansible.builtin.assert:
        that:
          - stateful_set.resources | length > 0
          - stateful_set.resources[0].status.availableReplicas | default(0) == 1
        fail_msg: "StatefulSet 'mongodb-database-mongodb-instance' is not available."
