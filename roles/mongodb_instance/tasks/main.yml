---
- name: "Include setup when enabled"
  ansible.builtin.include_tasks:
    file: "setup.yml"
    apply:
      tags:
        - "mongodb_instance"
        - "install"
  when: mongodb_instance_enabled
  tags: ["always"]

- name: "Include cleanup when disabled"
  ansible.builtin.include_tasks:
    file: "cleanup.yml"
    apply:
      tags:
        - "mongodb_instance"
        - "uninstall"
  when: not mongodb_instance_enabled
  tags: ["always"]
