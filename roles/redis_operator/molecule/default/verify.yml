---
- name: Verify
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: "Pause for job to complete."
      ansible.builtin.pause:
        seconds: 120

    - name: "Get 'redis-operator' namespace info."
      kubernetes.core.k8s_info:
        kind: Namespace
        name: "redis-operator"
      register: namespace_redis

    - name: "Assert that 'redis-operator' namespace is active"
      ansible.builtin.assert:
        that: namespace_redis['resources'][0]['status']['phase'] == "Active"

    - name: "Get 'redis-operator' Deployment info."
      kubernetes.core.k8s_info:
        kind: "Deployment"
        name: "redis-operator"
        namespace: "redis-operator"
      register: operator_deployment

    - name: "Assert that 'redis-operator' is deployed"
      ansible.builtin.assert:
        that: operator_deployment['resources'][0]['status']['availableReplicas'] == 1
