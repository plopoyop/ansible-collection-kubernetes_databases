---
- name: Verify
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: "Wait for 'redis-operator' namespace to be active."
      kubernetes.core.k8s_info:
        kind: Namespace
        name: "redis-operator"
      register: namespace_redis
      until:
        - namespace_redis.resources | length > 0
        - namespace_redis.resources[0].status.phase == "Active"
      retries: 30
      delay: 5

    - name: "Assert that 'redis-operator' namespace is active."
      ansible.builtin.assert:
        that:
          - namespace_redis.resources | length > 0
          - namespace_redis.resources[0].status.phase == "Active"
        fail_msg: "Namespace 'redis-operator' is not active."

    - name: "Wait for 'redis-operator' deployment to be available."
      kubernetes.core.k8s_info:
        kind: "Deployment"
        name: "redis-operator"
        namespace: "redis-operator"
      register: operator_deployment
      until:
        - operator_deployment.resources | length > 0
        - operator_deployment.resources[0].status.availableReplicas | default(0) == 1
      retries: 30
      delay: 5

    - name: "Assert that 'redis-operator' deployment is available."
      ansible.builtin.assert:
        that:
          - operator_deployment.resources | length > 0
          - operator_deployment.resources[0].status.availableReplicas | default(0) == 1
        fail_msg: "Deployment 'redis-operator' is not available."
