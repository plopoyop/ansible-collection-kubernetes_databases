---
- name: Verify
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: "Pause for job to complete."
      ansible.builtin.pause:
        seconds: 30

    - name: "Check if 'redis-operator' namespace exists."
      kubernetes.core.k8s_info:
        kind: Namespace
        name: "redis-operator"
      register: namespace_redis
      failed_when: false
      changed_when: false

    - name: Assert that 'redis-operator' namespace does not exist
      ansible.builtin.assert:
        that: namespace_redis['resources'] | length == 0
