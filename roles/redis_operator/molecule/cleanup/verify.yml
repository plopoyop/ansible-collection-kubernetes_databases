---
- name: Verify
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: "Wait for 'redis-operator' namespace to be removed."
      kubernetes.core.k8s_info:
        kind: Namespace
        name: "redis-operator"
      register: namespace_redis
      until: namespace_redis.resources | length == 0
      retries: 30
      delay: 5
      changed_when: false

    - name: "Assert that 'redis-operator' namespace is removed."
      ansible.builtin.assert:
        that: namespace_redis.resources | length == 0
        fail_msg: "Namespace 'redis-operator' is not removed."
