---
- name: Create
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Build a kind cluster (wait for control plane).
      ansible.builtin.command: >-
        kind create cluster
        --wait 300s
        --name molecule-test
        --kubeconfig {{ kubeconfig }}
      changed_when: true

    - name: "Install Redis operator"
      ansible.builtin.import_role:
        name: "redis_operator"

    - name: "Pause for operator to be ready."
      ansible.builtin.pause:
        seconds: 60

    - name: "Install Redis instance (standalone)"
      ansible.builtin.import_role:
        name: "redis_instance"
      vars:
        redis_instance_mode: "standalone"
