---
- name: Verify
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: "Wait for 'mariadb-operator' namespace to be removed."
      kubernetes.core.k8s_info:
        kind: Namespace
        name: "mariadb-operator"
      register: namespace_mariadb_operator
      until: namespace_mariadb_operator.resources | length == 0
      retries: 30
      delay: 5
      changed_when: false

    - name: "Assert that 'mariadb-operator' namespace is removed."
      ansible.builtin.assert:
        that: namespace_mariadb_operator.resources | length == 0
        fail_msg: "Namespace 'mariadb-operator' is still present."
