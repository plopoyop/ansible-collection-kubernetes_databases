---
- name: "Create MariaDB Operator namespace"
  kubernetes.core.k8s:
    name: "{{ mariadb_operator_namespace }}"
    api_version: "v1"
    kind: "Namespace"
    state: "present"

- name: "Add MariaDB Operator Helm repository"
  kubernetes.core.helm_repository:
    name: "{{ mariadb_operator_helm_repo_name }}"
    repo_url: "{{ mariadb_operator_helm_repo_url }}"
    state: "present"

- name: "Install MariaDB Operator CRDs"
  kubernetes.core.helm:
    name: "{{ mariadb_operator_crds_deployment_name }}"
    chart_ref: "{{ mariadb_operator_crds_helm_chart_ref }}"
    chart_version: "{{ mariadb_operator_crds_helm_chart_version }}"
    namespace: "{{ mariadb_operator_namespace }}"
    state: "present"
  when: mariadb_operator_crds_enabled

- name: "Uninstall MariaDB Operator CRDs"
  kubernetes.core.helm:
    name: "{{ mariadb_operator_crds_deployment_name }}"
    namespace: "{{ mariadb_operator_namespace }}"
    state: "absent"
    chart_ref: "{{ mariadb_operator_crds_helm_chart_ref }}"
    chart_version: "{{ mariadb_operator_crds_helm_chart_version }}"
    wait: true
  when: not mariadb_operator_crds_enabled

- name: "Install MariaDB Operator"
  kubernetes.core.helm:
    name: "{{ mariadb_operator_deployment_name }}"
    chart_ref: "{{ mariadb_operator_helm_chart_ref }}"
    chart_version: "{{ mariadb_operator_helm_chart_version }}"
    namespace: "{{ mariadb_operator_namespace }}"
    values: "{{ lookup('ansible.builtin.template', 'mariadb_operator_helm_values.yml.j2') | from_yaml }}"
    state: "present"
  when: mariadb_operator_enabled

- name: "Uninstall MariaDB Operator"
  kubernetes.core.helm:
    name: "{{ mariadb_operator_deployment_name }}"
    namespace: "{{ mariadb_operator_namespace }}"
    state: "absent"
    chart_ref: "{{ mariadb_operator_helm_chart_ref }}"
    chart_version: "{{ mariadb_operator_helm_chart_version }}"
    wait: true
  when: not mariadb_operator_enabled
