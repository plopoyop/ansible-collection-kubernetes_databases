---
- name: "Include setup when enabled"
  ansible.builtin.include_tasks:
    file: "setup.yml"
    apply:
      tags:
        - "mariadb_instance"
        - "install"
  when: mariadb_instance_enabled
  tags: ["always"]

- name: "Include cleanup when disabled"
  ansible.builtin.include_tasks:
    file: "cleanup.yml"
    apply:
      tags:
        - "mariadb_instance"
        - "uninstall"
  when: not mariadb_instance_enabled
  tags: ["always"]
