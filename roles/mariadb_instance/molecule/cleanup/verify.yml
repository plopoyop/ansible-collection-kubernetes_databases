---
- name: Verify
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: "Wait for 'mariadb' namespace to be removed."
      kubernetes.core.k8s_info:
        kind: Namespace
        name: "mariadb"
      register: namespace_mariadb
      until: namespace_mariadb.resources | length == 0
      retries: 30
      delay: 5
      changed_when: false

    - name: "Assert that 'mariadb' namespace is removed."
      ansible.builtin.assert:
        that: namespace_mariadb.resources | length == 0
        fail_msg: "Namespace 'mariadb' is not removed."
