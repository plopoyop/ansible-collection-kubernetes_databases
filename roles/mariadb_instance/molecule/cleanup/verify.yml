---
- name: Verify
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: "Pause for job to complete."
      ansible.builtin.pause:
        seconds: 60

    - name: "Check if 'mariadb' namespace exists."
      kubernetes.core.k8s_info:
        kind: Namespace
        name: "mariadb"
      register: namespace_mariadb
      failed_when: false
      changed_when: false

    - name: Assert that 'mariadb' namespace does not exist
      ansible.builtin.assert:
        that: namespace_mariadb['resources'] | length == 0
