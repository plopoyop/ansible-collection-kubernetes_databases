---
- name: Create
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Build a kind cluster (wait for control plane).
      ansible.builtin.command: >-
        kind create cluster
        --wait 300s
        --name molecule-test
        --kubeconfig {{ kubeconfig }}
      changed_when: true

    - name: "Install OpenSearch operator"
      ansible.builtin.import_role:
        name: "opensearch_operator"
      vars:
        opensearch_operator_webhook_enabled: false
        opensearch_operator_certmanager_enabled: false

    - name: "Pause for operator to be ready."
      ansible.builtin.pause:
        seconds: 60

    - name: "Install OpenSearch instance"
      ansible.builtin.import_role:
        name: "opensearch_cluster"
      vars:
        opensearch_cluster_values_override:
          dashboards_enabled: false
          node_pools:
            - component: "masters"
              disk_size: "5Gi"
              replicas: 3
              roles:
                - "cluster_manager"
                - "data"
              resources: {}
