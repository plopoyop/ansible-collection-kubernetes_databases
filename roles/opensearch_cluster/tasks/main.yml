---
- name: "Include setup when enabled"
  ansible.builtin.include_tasks:
    file: "setup.yml"
    apply:
      tags:
        - "opensearch_cluster"
        - "install"
  when: opensearch_cluster_enabled
  tags: ["always"]

- name: "Include cleanup when disabled"
  ansible.builtin.include_tasks:
    file: "cleanup.yml"
    apply:
      tags:
        - "opensearch_cluster"
        - "uninstall"
  when: not opensearch_cluster_enabled
  tags: ["always"]
