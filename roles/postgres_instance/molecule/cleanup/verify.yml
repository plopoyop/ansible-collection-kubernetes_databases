---
- name: Verify
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: "Pause for job to complete."
      ansible.builtin.pause:
        seconds: 30

    - name: "Check if 'postgres-instance' namespace exists."
      kubernetes.core.k8s_info:
        kind: Namespace
        name: "postgres-instance"
      register: namespace_postgres
      failed_when: false
      changed_when: false

    - name: Assert that 'postgres-instance' namespace does not exist
      ansible.builtin.assert:
        that: namespace_postgres['resources'] | length == 0
