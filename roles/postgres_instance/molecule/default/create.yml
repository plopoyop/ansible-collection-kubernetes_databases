---
- name: Create
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    postgres_operator_ui_enabled: true
  tasks:
    - name: Build a kind cluster (wait for control plane).
      ansible.builtin.command: >-
        kind create cluster
        --wait 300s
        --name molecule-test
        --kubeconfig {{ kubeconfig }}
      changed_when: true

    - name: "Install postgres operator"
      ansible.builtin.import_role:
        name: "postgres_operator"
