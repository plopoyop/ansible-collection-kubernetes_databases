---
- name: Verify
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: "Pause for job to complete."
      ansible.builtin.pause:
        seconds: 120

    - name: "Get 'postgres-operator' namespace info."
      kubernetes.core.k8s_info:
        kind: Namespace
        name: "postgres-operator"
      register: namespace_postgres_operator

    - name: "Assert that 'postgres-operator' namespace is active"
      ansible.builtin.assert:
        that: namespace_postgres_operator['resources'][0]['status']['phase'] == "Active"

    - name: "Get 'postgres-operator' deployment info."
      kubernetes.core.k8s_info:
        kind: "Deployment"
        name: "postgres-operator"
        namespace: "postgres-operator"
      register: operator_deployment

    - name: "Assert that 'postgres-operator' is deployed"
      ansible.builtin.assert:
        that: operator_deployment['resources'][0]['status']['availableReplicas'] == 1
