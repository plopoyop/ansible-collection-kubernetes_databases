---
- name: Verify
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: "Pause for job to complete."
      ansible.builtin.pause:
        seconds: 30

    - name: "Check if 'postgres-operator' namespace exists."
      kubernetes.core.k8s_info:
        kind: Namespace
        name: "postgres-operator"
      register: namespace_postgres_operator
      failed_when: false
      changed_when: false

    - name: Assert that 'postgres-operator' namespace does not exist
      ansible.builtin.assert:
        that: namespace_postgres_operator['resources'] | length == 0
