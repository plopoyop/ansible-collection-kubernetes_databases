---
- name: "Include setup when enabled"
  ansible.builtin.include_tasks:
    file: "setup.yml"
    apply:
      tags:
        - "postgres_operator"
        - "install"
  when: postgres_operator_enabled
  tags: ["always"]

- name: "Include cleanup when disabled"
  ansible.builtin.include_tasks:
    file: "cleanup.yml"
    apply:
      tags:
        - "postgres_operator"
        - "uninstall"
  when: not postgres_operator_enabled
  tags: ["always"]
